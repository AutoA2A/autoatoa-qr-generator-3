<main>

<section>
  <h2>分享QR码</h2>
  <div id="qr-preview" class="card" style="text-align:center;">
    <img id="qr-img" src="" alt="QR code" style="max-width:200px;margin-bottom:8px;">
    <p id="qr-text" style="color:var(--muted);font-size:.9rem;"></p>
  </div>
</section>

<section>
  <h3>短链接</h3>
  <input id="short-link" readonly style="width:100%;padding:8px;box-sizing:border-box;font-family:inherit;">
  <button id="copy-short-link">复制链接</button>
</section>

<section>
  <h3>嵌入HTML代码</h3>
  <textarea id="embed-code" readonly style="width:100%;height:60px;padding:8px;box-sizing:border-box;font-family:inherit;"></button>
  <button id="copy-embed">复制代码</button>
</section>

<section>
  <h3>一键分享</h3>
  <button id="share-btn">分享到微信/微博/QQ等</button>
</section>

<script>
(function(){
  function dataURLToBlob(dataurl){
    var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
        bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
    while(n--) u8arr[n]=bstr.charCodeAt(n);
    return new Blob([u8arr],{type:mime});
  }
  function copyToClipboard(text){
    navigator.clipboard.writeText(text).then(()=>{
      alert('已复制到剪贴板');
    }).catch(()=>{
      var ta=document.createElement('textarea');
      ta.value=text;document.body.appendChild(ta);
      ta.select();document.execCommand('copy');
      document.body.removeChild(ta);
      alert('已复制到剪贴板');
    });
  }
  var stored = localStorage.getItem('lastQR');
  var preview=document.getElementById('qr-img'), textEl=document.getElementById('qr-text');
  var shortInp=document.getElementById('short-link'), embedTa=document.getElementById('embed-code');
  var copyShort=document.getElementById('copy-short-link'), copyEmbed=document.getElementById('copy-embed');
  var shareBtn=document.getElementById('share-btn');
  if(!stored){
    preview.src='';
    textEl.textContent='未找到QR码，请先生成。';
    shortInp.value='';
    embedTa.value='';
    return;
  }
  var obj=JSON.parse(stored);
  preview.src=obj.dataUrl;
  textEl.textContent=obj.text;
  var shortUrl=location.origin+location.pathname.replace(/[^/]+$/, 'index.html')+'?text='+encodeURIComponent(obj.text);
  shortInp.value=shortUrl;
  embedTa.value='<img src="'+obj.dataUrl+'" alt="QR code" width="150" height="150">';
  copyShort.onclick=function(){copyToClipboard(shortUrl);};
  copyEmbed.onclick=function(){copyToClipboard(embedTa.value);};
  shareBtn.onclick=function(){
    if(navigator.share){
      var blob=dataURLToBlob(obj.dataUrl);
      var file=new File([blob],'qrcode.png',{type:blob.type});
      navigator.share({
        title:'我的QR码',
        text:obj.text,
        url:shortUrl,
        files:[file]
      }).catch(()=>alert('分享失败或被取消'));
    }else{
      alert('当前浏览器不支持Web Share API，请长按图片保存后手动分享。');
    }
  };
})();
</script>
