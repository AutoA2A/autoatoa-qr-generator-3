<main>

<article class="card"><h3>设置 - 参数与偏好</h3>
<form id="settingsForm">
  <div style="margin-bottom:12px;">
    <label for="defaultSize">默认尺寸（像素）：</label>
    <select id="defaultSize" style="padding:4px;">
      <option value="100">100</option>
      <option value="150">150</option>
      <option value="200" selected>200</option>
      <option value="250">250</option>
      <option value="300">300</option>
    </select>
  </div>
  <div style="margin-bottom:12px;">
    <label for="errorLevel">容错级别：</label>
    <select id="errorLevel" style="padding:4px;">
      <option value="L">L (7%)</option>
      <option value="M" selected>M (15%)</option>
      <option value="Q">Q (25%)</option>
      <option value="H">H (30%)</option>
    </select>
  </div>
  <div style="margin-bottom:12px;">
    <label>
      <input type="checkbox" id="autoSaveHistory" style="margin-right:4px;">
      自动保存历史记录
    </label>
  </div>
</form>
<button id="clearHistoryBtn" class="btn" style="margin-top:8px;">清除历史记录</button>
</article>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('settingsForm');
  const sizeSelect = document.getElementById('defaultSize');
  const levelSelect = document.getElementById('errorLevel');
  const autoSaveCheckbox = document.getElementById('autoSaveHistory');
  const clearBtn = document.getElementById('clearHistoryBtn');

  // 读取已保存的设置（若无则使用默认值）
  const saved = JSON.parse(localStorage.getItem('qrSettings') || '{}');
  if (saved.defaultSize) sizeSelect.value = saved.defaultSize;
  if (saved.errorLevel) levelSelect.value = saved.errorLevel;
  if (saved.autoSaveHistory !== undefined) autoSaveCheckbox.checked = saved.autoSaveHistory;

  // 保存设置
  function saveSettings() {
    const settings = {
      defaultSize: sizeSelect.value,
      errorLevel: levelSelect.value,
      autoSaveHistory: autoSaveCheckbox.checked
    };
    localStorage.setItem('qrSettings', JSON.stringify(settings));
  }

  sizeSelect.addEventListener('change', saveSettings);
  levelSelect.addEventListener('change', saveSettings);
  autoSaveCheckbox.addEventListener('change', saveSettings);

  // 清除历史记录
  clearBtn.addEventListener('click', function () {
    if (confirm('确定要清除所有历史记录吗？此操作不可恢复。')) {
      localStorage.removeItem('qrHistory');
      alert('历史记录已清除。');
    }
  });
});
</script>
