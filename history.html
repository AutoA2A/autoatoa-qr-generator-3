<main>

<section>
  <h2>历史记录</h2>
  <div id="history-list"></div>
</section>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const list = document.getElementById('history-list');
  const history = JSON.parse(localStorage.getItem('qrHistory') || '[]');
  if (history.length === 0) {
    list.innerHTML = '<p class="empty">暂无记录</p><a href="index.html" class="btn">去生成</a>';
    return;
  }
  history.forEach(function (item) {
    const card = document.createElement('article');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = item.dataURL || '';
    img.alt = 'QR码';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    card.appendChild(img);

    const info = document.createElement('div');
    info.style.marginTop = '8px';

    const txt = document.createElement('p');
    txt.style.margin = '0 0 4px';
    const displayText = (item.text || '').length > 30 ? (item.text || '').substring(0, 30) + '...' : (item.text || '');
    txt.textContent = displayText;
    info.appendChild(txt);

    const time = document.createElement('p');
    time.style.margin = '0';
    time.style.fontSize = '0.9rem';
    time.style.color = 'var(--muted)';
    time.textContent = new Date(item.timestamp || 0).toLocaleString();
    info.appendChild(time);

    card.appendChild(info);

    const btns = document.createElement('div');
    btns.style.marginTop = '8px';

    const editBtn = document.createElement('button');
    editBtn.textContent = '重新编辑';
    editBtn.onclick = function () {
      sessionStorage.setItem('qrEditData', JSON.stringify(item));
      location.href = 'index.html';
    };

    const dlBtn = document.createElement('button');
    dlBtn.textContent = '下载';
    dlBtn.onclick = function () {
      const a = document.createElement('a');
      a.href = item.dataURL;
      a.download = 'qr-code.png';
      a.click();
    };

    btns.appendChild(editBtn);
    btns.appendChild(document.createTextNode(' '));
    btns.appendChild(dlBtn);
    card.appendChild(btns);

    list.appendChild(card);
  });
});
</script>
