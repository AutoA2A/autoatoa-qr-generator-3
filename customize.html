<main>

<article class="card">
  <h3>自定义 QR 码</h3>
  <div>
    <label>前景色：<input type="color" id="fgColor" value="#000000"></label>
    <label>背景色：<input type="color" id="bgColor" value="#ffffff"></label>
    <label>Logo（PNG/JPG）：<input type="file" id="logoInput" accept="image/*"></label>
  </div>
  <canvas id="qrCanvas" width="300" height="300" style="border:1px solid #ccc;margin-top:10px;"></canvas>
  <div style="margin-top:10px;">
    <button id="downloadBtn">下载 PNG</button>
  </div>
</article>

<script>
/* Simple pseudo QR generator */
function pseudoQR(text, size = 21) {
  const matrix = Array.from({length: size}, () => Array(size).fill(0));
  let sum = 0;
  for (let i = 0; i < text.length; i++) {
    sum += text.charCodeAt(i);
  }
  const seed = sum || 1;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const val = ((x * y * seed) + (x + y)) % 2;
      matrix[y][x] = val;
    }
  }
  // add finder patterns (three squares) to make it look more QR-like
  const placeFinder = (sx, sy) => {
    for (let dy = 0; dy < 7; dy++) {
      for (let dx = 0; dx < 7; dx++) {
        if ((dx===0 || dx===6 || dy===0 || dy===6) ||
            (dx>=2 && dx<=4 && dy>=2 && dy<=4)) {
          matrix[sy+dy][sx+dx] = 1;
        }
      }
    }
  };
  placeFinder(0,0);
  placeFinder(size-7,0);
  placeFinder(0,size-7);
  return matrix;
}

function drawQR() {
  const canvas = document.getElementById('qrCanvas');
  const ctx = canvas.getContext('2d');
  const fg = document.getElementById('fgColor').value;
  const bg = document.getElementById('bgColor').value;
  const text = new URLSearchParams(window.location.search).get('data') || 'https://example.com';
  const matrix = pseudoQR(text);
  const size = matrix.length;
  const cell = canvas.width / size;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = fg;
  for (let y=0;y<size;y++) {
    for (let x=0;x<size;x++) {
      if (matrix[y][x]) {
        ctx.fillRect(x*cell, y*cell, cell, cell);
      }
    }
  }
  // logo
  const logoImg = window._logoImg;
  if (logoImg) {
    const logoSize = cell * 6; // logo occupies ~6 modules
    const offset = (canvas.width - logoSize)/2;
    ctx.drawImage(logoImg, offset, offset, logoSize, logoSize);
  }
}
document.getElementById('fgColor').addEventListener('input', drawQR);
document.getElementById('bgColor').addEventListener('input', drawQR);
document.getElementById('logoInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      window._logoImg = img;
      drawQR();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
document.getElementById('downloadBtn').addEventListener('click', function(){
  const canvas = document.getElementById('qrCanvas');
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'qrcode.png';
  a.click();
});
// initial draw
drawQR();
</script>
