  <div>
    <label for="qr-text">内容：</label><br>
    <input type="text" id="qr-text" placeholder="输入文本或 URL" style="width:100%;padding:8px;box-sizing:border-box;">
  </div>
  <div style="margin-top:12px;">
    <label for="qr-size">尺寸（像素）：</label>
    <input type="range" id="qr-size" min="100" max="500" value="200">
    <span id="size-value">200</span>
  </div>
  <div id="qr-preview" style="margin-top:20px; text-align:center;"></div>
  <div style="margin-top:12px; text-align:center;">
    <button id="download-btn">下载 PNG</button>
  </div>

<script>
const textInput = document.getElementById('qr-text');
const sizeInput = document.getElementById('qr-size');
const sizeValue = document.getElementById('size-value');
const preview = document.getElementById('qr-preview');
const downloadBtn = document.getElementById('download-btn');

function updateSizeDisplay(){ sizeValue.textContent = sizeInput.value; }
sizeInput.addEventListener('input',()=>{updateSizeDisplay();generateQR();});
sizeInput.addEventListener('change',generateQR);
textInput.addEventListener('input',generateQR);

function generateQR(){
 const text = textInput.value.trim();
 if(!text){ preview.innerHTML=''; return; }
 const size = parseInt(sizeInput.value);
 preview.innerHTML='';
 const canvas = document.createElement('canvas');
 canvas.width = size; canvas.height = size;
 preview.appendChild(canvas);
 try{
  new QRCode(canvas,{text:text,width:size,height:size,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});
 }catch(e){ preview.textContent='生成失败'; }
}
downloadBtn.addEventListener('click',()=>{
 const canvas = preview.querySelector('canvas');
 if(!canvas) return;
 canvas.toBlob(blob=>{
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='qrcode.png'; a.click();
  URL.revokeObjectURL(url);
 });
});
updateSizeDisplay();
generateQR();
</script>
